<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Requerimento</title>

<style>
body{
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  padding: 40px;
}

/* título */
.titulo{
  text-align: center;
  color: white;
  margin-bottom: 35px;
}

/* card principal */
.card{
  background: white;
  max-width: 800px;
  margin: auto;
  padding: 30px;
  border-radius: 18px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.25);
  transition: 0.3s;
}

.card:hover{
  transform: translateY(-6px);
  box-shadow: 0 20px 45px rgba(0,0,0,0.35);
}

/* grid informações */
.info{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* campo individual */
.campo{
  background: #f8f9ff;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

.label{
  font-size: 13px;
  font-weight: bold;
  color: #667eea;
  margin-bottom: 6px;
}

.valor{
  font-size: 16px;
  color: #333;
}

/* observação ocupa largura total */
.observacao{
  margin-top: 20px;
}

/* anexo */
.anexo{
  margin-top: 25px;
  text-align: center;
}

.anexo img{
  max-width: 200px;
  border-radius: 14px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.anexo img:hover{
  transform: scale(1.05);
}

/* botão voltar */
.botao-voltar{
  display: block;
  width: 200px;
  margin: 30px auto 0 auto;
  text-align: center;
  padding: 12px;
  border-radius: 10px;
  background: white;
  color: #667eea;
  font-weight: bold;
  text-decoration: none;
  transition: 0.3s;
}

.botao-voltar:hover{
  background: #f1f3ff;
  transform: scale(1.05);
}

/* responsivo */
@media (max-width: 600px){
  .info{
    grid-template-columns: 1fr;
  }
}
</style>

</head>
<body>

<h1 class="titulo">Detalhes do Requerimento</h1>

<div class="card">

  <div class="info">

    <div class="campo">
      <div class="label">Matrícula</div>
      <div class="valor">
        {{requerimento.aluno.matricula}}
      </div>
    </div>

    <div class="campo">
      <div class="label">Tipo</div>
      <div class="valor">
        {{requerimento.tipoRequerimento.descricao}}
      </div>
    </div>

    <div class="campo">
      <div class="label">Data de Abertura</div>
      <div class="valor">
        {{requerimento.dataHoraAberturaFormatada}}
      </div>
    </div>

    <div class="campo">
      <div class="label">Data de Encerramento</div>
      <div class="valor">
        {{requerimento.dataHoraEncerramentoFormatada}}
      </div>
    </div>

  </div>

  <div class="campo observacao">
    <div class="label">Observação</div>
    <div class="valor">
      {{requerimento.observacao}}
    </div>
  </div>

  <div class="anexo">
    <div class="label">Anexo</div>
    <img src="data:image/jpeg;base64,{{requerimento.anexoEncode}}">
  </div>

</div>

<a class="botao-voltar" href="/requerimentos">← Voltar</a>

</body>
</html>
